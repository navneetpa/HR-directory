<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HR Directory — Navneet Pathak</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root,[data-theme="light"]{
  --bg:#f0f2f7;
  --surface:#ffffff;
  --surface-2:#e8eaf0;
  --surface-3:#dde0ea;
  --border:rgba(0,0,0,0.08);
  --border-hover:rgba(0,0,0,0.18);
  --text-1:#0f172a;
  --text-2:#475569;
  --text-3:#94a3b8;
  --accent:#2563eb;
  --accent-soft:#eff6ff;
  --accent-text:#1d4ed8;
  --shadow-sm:0 1px 4px rgba(0,0,0,0.07);
  --shadow-md:0 4px 20px rgba(0,0,0,0.09);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
  --radius:14px;
  --radius-sm:8px;
  --radius-pill:100px;
  --phone-bg:#dcfce7;--phone-c:#15803d;
  --mail-bg:#dbeafe; --mail-c:#1d4ed8;
  --li-bg:#e0e7ff;   --li-c:#4338ca;
}
[data-theme="dark"]{
  --bg:#080c14;
  --surface:#111827;
  --surface-2:#1e2535;
  --surface-3:#263044;
  --border:rgba(255,255,255,0.07);
  --border-hover:rgba(255,255,255,0.16);
  --text-1:#f1f5f9;
  --text-2:#94a3b8;
  --text-3:#475569;
  --accent:#3b82f6;
  --accent-soft:#1e3a5f;
  --accent-text:#93c5fd;
  --shadow-sm:0 1px 4px rgba(0,0,0,0.4);
  --shadow-md:0 4px 20px rgba(0,0,0,0.5);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.6);
  --phone-bg:#14532d;--phone-c:#86efac;
  --mail-bg:#1e3a5f; --mail-c:#93c5fd;
  --li-bg:#1e1b4b;   --li-c:#a5b4fc;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);
  color:var(--text-1);
  min-height:100vh;
  transition:background .3s,color .3s;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.header{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 2rem;
  height:64px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:50;
  box-shadow:var(--shadow-sm);
  transition:background .3s,border-color .3s;
}
.header-left{display:flex;align-items:center;gap:10px;}
.logo-wrap{
  width:38px;height:38px;border-radius:10px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:20px;flex-shrink:0;
}
.header h1{font-size:17px;font-weight:700;letter-spacing:-.3px;}
.header p{font-size:12px;color:var(--text-3);margin-top:1px;}
.header-right{display:flex;align-items:center;gap:8px;}

.btn-outline{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:var(--radius-pill);
  border:1px solid var(--border);
  background:var(--surface-2);
  color:var(--text-2);font-size:13px;font-weight:500;
  cursor:pointer;text-decoration:none;
  transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.btn-outline:hover{border-color:var(--border-hover);color:var(--text-1);}
.btn-outline i{font-size:16px;}

.btn-accent{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 16px;border-radius:var(--radius-pill);
  border:none;background:var(--accent);
  color:#fff;font-size:13px;font-weight:600;
  cursor:pointer;text-decoration:none;
  transition:opacity .2s;white-space:nowrap;flex-shrink:0;
}
.btn-accent:hover{opacity:.88;}
.btn-accent i{font-size:16px;}
[data-theme="dark"] .btn-accent{color:#fff;}

/* ══════════════════════════════════════
   HERO STRIP
══════════════════════════════════════ */
.hero{
  background:linear-gradient(135deg,#1d4ed8 0%,#2563eb 40%,#0ea5e9 100%);
  padding:2rem 2rem 2.5rem;
  position:relative;overflow:hidden;
}
.hero::after{
  content:'';position:absolute;right:-60px;top:-60px;
  width:280px;height:280px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.hero-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1;}
.hero h2{font-size:26px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-bottom:6px;}
.hero p{font-size:14px;color:rgba(255,255,255,.75);max-width:480px;}

/* ══════════════════════════════════════
   STATS
══════════════════════════════════════ */
.stats-outer{background:var(--surface);border-bottom:1px solid var(--border);padding:.1rem 2rem .1rem;}
.stats-inner{max-width:1200px;margin:0 auto;}
.stats-row{display:flex;gap:0;overflow-x:auto;scrollbar-width:none;}
.stats-row::-webkit-scrollbar{display:none;}
.stat{
  flex:1;min-width:120px;padding:1rem 1.25rem;
  border-right:1px solid var(--border);
  transition:background .3s;
}
.stat:last-child{border-right:none;}
.stat .lbl{font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.stat .val{font-size:24px;font-weight:800;color:var(--text-1);}
.stat .sub{font-size:11px;color:var(--text-3);margin-top:2px;}

/* ══════════════════════════════════════
   CONTAINER
══════════════════════════════════════ */
.container{max-width:1200px;margin:0 auto;padding:1.5rem 2rem 5rem;}

/* ══════════════════════════════════════
   SEARCH + FILTERS
══════════════════════════════════════ */
.controls{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.1rem 1.25rem;
  margin-bottom:1.25rem;
  box-shadow:var(--shadow-sm);
}
.search-wrap{position:relative;margin-bottom:1rem;}
.search-wrap i{
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  font-size:18px;color:var(--text-3);pointer-events:none;
}
.search-wrap input{
  width:100%;padding:11px 14px 11px 42px;
  border:1.5px solid var(--border);border-radius:var(--radius-sm);
  background:var(--surface-2);
  font-size:14px;color:var(--text-1);outline:none;
  transition:border-color .15s,background .3s;
}
.search-wrap input:focus{border-color:var(--accent);background:var(--surface);}
.search-wrap input::placeholder{color:var(--text-3);}

.filter-label{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;}
/* ── Dropdown filters ── */
.filter-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:4px;}
.dropdown-wrap{position:relative;flex:1;min-width:180px;}
.dropdown-btn{
  width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:9px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--surface-2);
  color:var(--text-1);font-size:13.5px;font-weight:500;
  cursor:pointer;transition:all .15s;text-align:left;
}
.dropdown-btn:hover{border-color:var(--border-hover);}
.dropdown-btn.open{border-color:var(--accent);background:var(--surface);}
.dropdown-btn i.arrow{font-size:16px;color:var(--text-3);transition:transform .2s;flex-shrink:0;}
.dropdown-btn.open i.arrow{transform:rotate(180deg);}
.dropdown-btn .selected-text{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dropdown-btn .badge-count{
  font-size:11px;font-weight:700;
  background:var(--accent);color:#fff;
  border-radius:var(--radius-pill);padding:1px 7px;flex-shrink:0;
}

.dropdown-menu{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:var(--radius-sm);
  box-shadow:var(--shadow-lg);
  z-index:200;
  max-height:280px;overflow-y:auto;
  display:none;
  scrollbar-width:thin;
  scrollbar-color:var(--border) transparent;
}
.dropdown-menu.open{display:block;animation:dropIn .15s ease;}
@keyframes dropIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}

.dd-search{
  padding:8px 10px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--surface);z-index:1;
}
.dd-search input{
  width:100%;padding:6px 10px 6px 30px;
  border:1px solid var(--border);border-radius:6px;
  background:var(--surface-2);color:var(--text-1);
  font-size:12.5px;outline:none;
}
.dd-search input:focus{border-color:var(--accent);}
.dd-search input::placeholder{color:var(--text-3);}
.dd-search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-3);}

.dd-option{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;font-size:13px;color:var(--text-2);
  cursor:pointer;transition:background .1s;gap:8px;
}
.dd-option:hover{background:var(--surface-2);}
.dd-option.active{background:var(--accent-soft);color:var(--accent-text);font-weight:600;}
.dd-option .opt-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dd-option .opt-count{font-size:11px;color:var(--text-3);flex-shrink:0;}
.dd-option.active .opt-count{color:var(--accent-text);opacity:.7;}
.dd-divider{height:1px;background:var(--border);margin:2px 0;}

/* ══════════════════════════════════════
   COUNT + SORT
══════════════════════════════════════ */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.count-line{font-size:13px;color:var(--text-3);}
.count-line b{color:var(--text-1);}

/* ══════════════════════════════════════
   GRID + CARDS
══════════════════════════════════════ */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:1.2rem 1.25rem 1.1rem;
  box-shadow:var(--shadow-sm);
  transition:border-color .2s,box-shadow .2s,transform .2s;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--card-a),var(--card-b));
}
.card:hover{
  border-color:var(--border-hover);
  box-shadow:var(--shadow-md);
  transform:translateY(-2px);
}

.card-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px;}
.avatar{
  width:46px;height:46px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:15px;letter-spacing:-.3px;
}
.card-name{font-weight:700;font-size:15px;color:var(--text-1);line-height:1.3;margin-bottom:3px;}
.card-desig{font-size:11.5px;color:var(--text-2);line-height:1.4;}

.badge-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px;}
.badge{
  display:inline-flex;align-items:center;gap:4px;
  font-size:11px;font-weight:600;
  padding:3px 9px;border-radius:var(--radius-pill);
}
.badge i{font-size:11px;}

/* Contact rows */
.contact-rows{display:flex;flex-direction:column;gap:6px;}
.info-row{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--text-2);}
.icon-pill{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:background .3s;
}
.icon-pill.phone  {background:var(--phone-bg);color:var(--phone-c);}
.icon-pill.mail   {background:var(--mail-bg); color:var(--mail-c);}
.icon-pill.li     {background:var(--li-bg);   color:var(--li-c);}
.info-row span{color:var(--text-2);}
.info-row a{
  color:var(--accent);text-decoration:none;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:215px;display:block;
}
.info-row a:hover{text-decoration:underline;}

/* ══════════════════════════════════════
   EMPTY
══════════════════════════════════════ */
.empty{grid-column:1/-1;text-align:center;padding:5rem 2rem;color:var(--text-3);}
.empty i{font-size:48px;display:block;margin-bottom:12px;opacity:.4;}
.empty p{font-size:14px;}

/* ══════════════════════════════════════
   WATERMARK
══════════════════════════════════════ */
.watermark{
  position:fixed;bottom:18px;right:18px;
  display:flex;align-items:center;gap:7px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius-pill);
  padding:7px 15px 7px 10px;
  font-size:12px;font-weight:600;
  color:var(--text-2);
  text-decoration:none;
  box-shadow:var(--shadow-md);
  z-index:100;
  transition:all .2s;
}
.watermark:hover{border-color:var(--accent);color:var(--accent);}
.watermark i{font-size:16px;color:var(--accent);}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:768px){
  .grid{grid-template-columns:1fr 1fr;gap:10px;}
  .stats-row{gap:0;}
  .stat{min-width:100px;padding:.8rem 1rem;}
}
@media(max-width:600px){
  .header{padding:0 1rem;height:56px;}
  .header h1{font-size:15px;}
  .header p{display:none;}
  .hero{padding:1.4rem 1rem 1.8rem;}
  .hero h2{font-size:20px;}
  .hero p{font-size:13px;}
  .stats-outer{padding:0 1rem;}
  .container{padding:1rem 1rem 5rem;}
  .controls{padding:.9rem 1rem;}
  .grid{grid-template-columns:1fr;gap:10px;}
  .btn-outline .btn-label,.btn-accent .btn-label{display:none;}
  .btn-outline,.btn-accent{padding:7px 10px;border-radius:50%;}
  .watermark .wm-label{display:none;}
  .watermark{padding:9px;border-radius:50%;}
  .watermark i{font-size:19px;margin:0;}
  .info-row a{max-width:180px;}
}
@media(max-width:400px){
  .grid{grid-template-columns:1fr;}
  .stat .val{font-size:20px;}
}
</style>
</head>

    </div>
    <div class="filter-row">
      <!-- Category dropdown -->
      <div class="dropdown-wrap" id="catWrap">

      <div class="dropdown-wrap" id="coWrap">
        <button class="dropdown-btn" id="coBtn" onclick="toggleDD('co')">
          <i class="ti ti-building" style="font-size:15px;color:var(--text-3);flex-shrink:0;"></i>
          <span class="selected-text" id="coBtnText">All Companies</span>
          <i class="ti ti-chevron-down arrow"></i>
        </button>
        <div class="dropdown-menu" id="coMenu">
          <div class="dd-search">
            <i class="ti ti-search dd-search-icon"></i>
            <input type="text" id="coSearch" placeholder="Search company…" oninput="filterCoOptions()"/>
          </div>
          <div class="dd-option active" data-val="All" onclick="setCoDD('All',this)">
            <span class="opt-label">All Companies</span>
            <span class="opt-count" id="coAllCount"></span>
          </div>
          <div class="dd-divider"></div>
          <div id="coOptions"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="toolbar">
    <div class="count-line" id="countLine"></div>
  </div>

  <div class="grid" id="grid"></div>
</main>

<a href="https://navneetpa.github.io/my-profile" target="_blank" rel="noopener" class="watermark">

// ═══════════════════════════════════════════════════
// CATEGORY CONFIG
// ═══════════════════════════════════════════════════
const catCfg={
  "FMCG":        {grad:["#10b981","#059669"], light:{bg:"#d1fae5",c:"#065f46"}, dark:{bg:"#064e3b",c:"#6ee7b7"}},
  "Tech":        {grad:["#3b82f6","#2563eb"], light:{bg:"#dbeafe",c:"#1e40af"}, dark:{bg:"#1e3a5f",c:"#93c5fd"}},
  "Finance":     {grad:["#f59e0b","#d97706"], light:{bg:"#fef3c7",c:"#92400e"}, dark:{bg:"#451a03",c:"#fbbf24"}},
  "Ecommerce":   {grad:["#ec4899","#db2777"], light:{bg:"#fce7f3",c:"#9d174d"}, dark:{bg:"#500724",c:"#f9a8d4"}},
  "Consulting":  {grad:["#8b5cf6","#7c3aed"], light:{bg:"#ede9fe",c:"#4c1d95"}, dark:{bg:"#2e1065",c:"#c4b5fd"}},
  "Manufacturing":{grad:["#f97316","#ea580c"],light:{bg:"#ffedd5",c:"#9a3412"}, dark:{bg:"#431407",c:"#fdba74"}},
  "Healthcare":  {grad:["#14b8a6","#0d9488"], light:{bg:"#ccfbf1",c:"#134e4a"}, dark:{bg:"#042f2e",c:"#5eead4"}},
};
const defaultCat={grad:["#64748b","#475569"],light:{bg:"#f1f5f9",c:"#334155"},dark:{bg:"#1e293b",c:"#94a3b8"}};

const avatars=[
  {l:{bg:"#dbeafe",c:"#1e40af"},d:{bg:"#1e3a5f",c:"#93c5fd"}},
  {l:{bg:"#d1fae5",c:"#065f46"},d:{bg:"#064e3b",c:"#6ee7b7"}},
  {l:{bg:"#fef3c7",c:"#92400e"},d:{bg:"#451a03",c:"#fcd34d"}},
  {l:{bg:"#ede9fe",c:"#4c1d95"},d:{bg:"#2e1065",c:"#c4b5fd"}},
  {l:{bg:"#fce7f3",c:"#9d174d"},d:{bg:"#500724",c:"#f9a8d4"}},
  {l:{bg:"#ccfbf1",c:"#134e4a"},d:{bg:"#042f2e",c:"#5eead4"}},
  {l:{bg:"#fee2e2",c:"#991b1b"},d:{bg:"#450a0a",c:"#fca5a5"}},
  {l:{bg:"#fef9c3",c:"#854d0e"},d:{bg:"#422006",c:"#fde047"}},
];

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let isDark=false, activeCat="All", activeCo="All";
const cos=[...new Set(data.map(d=>d.co))];
const cats=[...new Set(data.map(d=>d.cat))];
const coMap={};cos.forEach((c,i)=>{coMap[c]=i%avatars.length;});

// ═══════════════════════════════════════════════════
// THEME
// ═══════════════════════════════════════════════════
function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute("data-theme",isDark?"dark":"light");
  document.getElementById("themeIcon").className=isDark?"ti ti-sun":"ti ti-moon";
  document.getElementById("themeLabel").textContent=isDark?"Light":"Dark";
  render();
}
const m=()=>isDark?"d":"l";
const md=()=>isDark?"dark":"light";

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const inits=n=>n.split(" ").slice(0,2).map(x=>x[0]).join("").toUpperCase();
const catColor=cat=>(catCfg[cat]||defaultCat)[md()];
const catGrad=cat=>(catCfg[cat]||defaultCat).grad;
const avColor=co=>avatars[coMap[co]][m()];

// ═══════════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════════
function initStats(){
  const ta=data.filter(d=>d.desig.toLowerCase().includes("talent")).length;
  document.getElementById("statsRow").innerHTML=`
    <div class="stat"><div class="lbl">Total</div><div class="val">${data.length}</div><div class="sub">Contacts</div></div>
    <div class="stat"><div class="lbl">Companies</div><div class="val">${cos.length}</div><div class="sub">Organizations</div></div>
    <div class="stat"><div class="lbl">Categories</div><div class="val">${cats.length}</div><div class="sub">Sectors</div></div>
    <div class="stat"><div class="lbl">Talent Acq.</div><div class="val">${ta}</div><div class="sub">Specialists</div></div>
    <div class="stat"><div class="lbl">Tech</div><div class="val">${data.filter(d=>d.cat==="Tech").length}</div><div class="sub">Profiles</div></div>
    <div class="stat"><div class="lbl">Finance</div><div class="val">${data.filter(d=>d.cat==="Finance").length}</div><div class="sub">Profiles</div></div>
  `;
}

// ═══════════════════════════════════════════════════
// FILTERS
// ═══════════════════════════════════════════════════
// ═══════════════════════════════════════════════════
// DROPDOWN LOGIC
// ═══════════════════════════════════════════════════
function toggleDD(which){
  const btn=document.getElementById(which==="cat"?"catBtn":"coBtn");
  const menu=document.getElementById(which==="cat"?"catMenu":"coMenu");
  const isOpen=menu.classList.contains("open");
  // close all first
  document.querySelectorAll(".dropdown-menu").forEach(m=>m.classList.remove("open"));
  document.querySelectorAll(".dropdown-btn").forEach(b=>b.classList.remove("open"));
  if(!isOpen){menu.classList.add("open");btn.classList.add("open");}
  if(which==="co"&&!isOpen){
    setTimeout(()=>{const s=document.getElementById("coSearch");if(s)s.focus();},50);
  }
}
// Close dropdowns on outside click
document.addEventListener("click",e=>{
  if(!e.target.closest(".dropdown-wrap")){
    document.querySelectorAll(".dropdown-menu").forEach(m=>m.classList.remove("open"));
    document.querySelectorAll(".dropdown-btn").forEach(b=>b.classList.remove("open"));
  }
});

function initFilters(){
  // Category dropdown
  document.getElementById("catAllCount").textContent=data.length;
  document.getElementById("catOptions").innerHTML=
    cats.map(c=>`
      <div class="dd-option" data-val="${c}" onclick="setCatDD('${c}',this)">
        <span class="opt-label">${c}</span>
        <span class="opt-count">${data.filter(d=>d.cat===c).length}</span>
      </div>`).join("");
  renderCoOptions();
}

function renderCoOptions(){
  const vis=activeCat==="All"?cos:[...new Set(data.filter(d=>d.cat===activeCat).map(d=>d.co))];
  document.getElementById("coAllCount").textContent=vis.reduce((a,c)=>a+data.filter(d=>d.co===c).length,0);
  document.getElementById("coOptions").innerHTML=
    vis.map(c=>`
      <div class="dd-option" data-val="${c.replace(/`/g,"\`")}" onclick="setCoDD(\`${c.replace(/`/g,"\`")}\`,this)">
        <span class="opt-label">${c}</span>
        <span class="opt-count">${data.filter(d=>d.co===c).length}</span>
      </div>`).join("");
  // re-mark active
  document.querySelectorAll("#coOptions .dd-option").forEach(el=>{
    if(el.dataset.val===activeCo)el.classList.add("active");
  });
}

function filterCoOptions(){
  const q=document.getElementById("coSearch").value.toLowerCase();
  document.querySelectorAll("#coOptions .dd-option").forEach(el=>{
    el.style.display=el.querySelector(".opt-label").textContent.toLowerCase().includes(q)?"":"none";
  });
}

function setCatDD(cat,el){
  activeCat=cat;activeCo="All";
  // update UI
  document.querySelectorAll("#catMenu .dd-option").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("catBtnText").textContent=cat==="All"?"All Categories":cat;
  document.getElementById("coBtnText").textContent="All Companies";
  // close dropdown
  document.getElementById("catMenu").classList.remove("open");
  document.getElementById("catBtn").classList.remove("open");
  renderCoOptions();render();
}

function setCoDD(co,el){
  activeCo=co;
  document.querySelectorAll("#coOptions .dd-option, #coMenu>[data-val='All']").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("coBtnText").textContent=co==="All"?"All Companies":co;
  document.getElementById("coMenu").classList.remove("open");
  document.getElementById("coBtn").classList.remove("open");
  render();
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const filtered=data.filter(d=>{
    const mc=activeCat==="All"||d.cat===activeCat;
    const mco=activeCo==="All"||d.co===activeCo;
    const ms=!q||d.name.toLowerCase().includes(q)||d.co.toLowerCase().includes(q)||d.desig.toLowerCase().includes(q);
    return mc&&mco&&ms;
  });
  const cl=document.getElementById("countLine");
  cl.innerHTML=`Showing <b>${filtered.length}</b> of <b>${data.length}</b> contacts`;

  const grid=document.getElementById("grid");
  if(!filtered.length){
    grid.innerHTML=`<div class="empty"><i class="ti ti-user-search"></i><p>No contacts found. Try a different search.</p></div>`;
    return;
  }
  grid.innerHTML=filtered.map(d=>{
    const av=avColor(d.co);
    const cc=catColor(d.cat);
    const cg=catGrad(d.cat);
    const cb=avatars[(coMap[d.co]+3)%avatars.length][m()];
    return `
    <div class="card" style="--card-a:${cg[0]};--card-b:${cg[1]}">
      <div class="card-head">
        <div class="avatar" style="background:${av.bg};color:${av.c}">${inits(d.name)}</div>
        <div style="flex:1;min-width:0;">
          <div class="card-name">${d.name}</div>
          <div class="card-desig">${d.desig}</div>
        </div>
      </div>
      <div class="badge-row">
        <span class="badge" style="background:${cc.bg};color:${cc.c}"><i class="ti ti-tag"></i>${d.cat}</span>
        <span class="badge" style="background:${cb.bg};color:${cb.c}"><i class="ti ti-building"></i>${d.co}</span>
      </div>
      <div class="contact-rows">
        <div class="info-row">
          <div class="icon-pill phone"><i class="ti ti-phone"></i></div>
          <span>${d.ph}</span>
        </div>
        <div class="info-row">
          <div class="icon-pill mail"><i class="ti ti-mail"></i></div>
          <a href="mailto:${d.email}" title="${d.email}">${d.email}</a>
        </div>
        <div class="info-row">
          <div class="icon-pill li"><i class="ti ti-brand-linkedin"></i></div>
          <a href="${d.li}" target="_blank" rel="noopener">View LinkedIn profile</a>
        </div>
      </div>
    </div>`;
  }).join("");
}

initStats();initFilters();render();
</script>
