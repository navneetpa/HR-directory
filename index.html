<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HR Directory — Navneet Pathak</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root,[data-theme="light"]{
  --maroon:#590016;--maroon-2:#3d0010;--maroon-3:#260009;
  --maroon-light:rgba(89,0,22,0.09);--maroon-light2:rgba(89,0,22,0.16);
  --ton-m:#fff;--ton-m2:rgba(255,255,255,0.6);--ton-m3:rgba(255,255,255,0.3);
  --bg:#FFFCEF;--surface:#fff;--surface2:#F5F1DE;--surface3:#EDE8D0;
  --bdr:rgba(89,0,22,0.1);--bdr-h:rgba(89,0,22,0.25);
  --t1:#1a1a2e;--t2:#4a4a6a;--t3:#9090a8;
  --shadow-sm:0 1px 4px rgba(89,0,22,0.07);--shadow-md:0 4px 20px rgba(89,0,22,0.12);--shadow-lg:0 8px 32px rgba(89,0,22,0.18);
  --r:14px;--rsm:9px;--rpill:100px;
  --phone-bg:#fce7f3;--phone-c:#9d174d;--mail-bg:#dbeafe;--mail-c:#1d4ed8;--li-bg:#e0e7ff;--li-c:#4338ca;
  --sw:220px;
}
[data-theme="dark"]{
  --maroon:#c0395a;--maroon-2:#a02d4a;--maroon-3:#7a2038;
  --maroon-light:rgba(192,57,90,0.15);--maroon-light2:rgba(192,57,90,0.28);
  --ton-m:#fff;--ton-m2:rgba(255,255,255,0.65);--ton-m3:rgba(255,255,255,0.3);
  --bg:#12080b;--surface:#1c0f13;--surface2:#26151a;--surface3:#321520;
  --bdr:rgba(192,57,90,0.18);--bdr-h:rgba(192,57,90,0.4);
  --t1:#fdf0f3;--t2:#c9a0ab;--t3:#7a5060;
  --shadow-sm:0 1px 4px rgba(0,0,0,0.4);--shadow-md:0 4px 20px rgba(0,0,0,0.55);--shadow-lg:0 8px 32px rgba(0,0,0,0.65);
  --phone-bg:#3b0a1a;--phone-c:#f9a8d4;--mail-bg:#0f2240;--mail-c:#93c5fd;--li-bg:#16124a;--li-c:#a5b4fc;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex;overflow-x:hidden;}

/* SIDEBAR */
.sidebar{width:var(--sw);min-height:100vh;background:var(--maroon);display:flex;flex-direction:column;position:fixed;left:0;top:0;bottom:0;z-index:100;box-shadow:4px 0 24px rgba(89,0,22,0.2);transition:transform .3s cubic-bezier(.4,0,.2,1);}
.sb-brand{padding:1.3rem 1rem 1rem;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0;}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:.9rem;}
.sb-logo-icon{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;color:#fff;font-size:19px;flex-shrink:0;}
.sb-logo-text{font-size:15px;font-weight:800;color:#fff;letter-spacing:-.3px;}
.sb-logo-sub{font-size:10px;color:var(--ton-m2);margin-top:1px;}
.sb-profile{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,0.12);border-radius:10px;padding:9px 11px;text-decoration:none;cursor:pointer;transition:background .2s;}
.sb-profile:hover{background:rgba(255,255,255,0.2);}
.sb-profile-av{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.sb-profile-name{font-size:12px;font-weight:600;color:#fff;}
.sb-profile-role{font-size:10px;color:var(--ton-m2);}

/* SIDEBAR SEARCH */
.sb-search{padding:.75rem .75rem .6rem;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0;}
.sb-search-wrap{position:relative;}
.sb-search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;color:rgba(255,255,255,0.45);pointer-events:none;}
.sb-search-wrap input{width:100%;padding:8px 32px 8px 32px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:12.5px;outline:none;transition:all .2s;}
.sb-search-wrap input::placeholder{color:rgba(255,255,255,0.4);}
.sb-search-wrap input:focus{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.35);}
.sb-search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:14px;color:rgba(255,255,255,0.45);cursor:pointer;display:none;padding:2px;}
.sb-search-clear:hover{color:#fff;}

/* NAV */
.sb-nav{flex:1;padding:.8rem .7rem;display:flex;flex-direction:column;gap:2px;overflow-y:auto;overflow-x:hidden;}
.sb-nav-label{font-size:9px;font-weight:700;color:var(--ton-m3);text-transform:uppercase;letter-spacing:.1em;padding:0 .4rem;margin-bottom:5px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:0 11px;border-radius:9px;cursor:pointer;transition:all .15s;color:var(--ton-m2);font-size:12.5px;font-weight:500;user-select:none;flex:1;min-height:40px;max-height:52px;}
.sb-item:hover{background:rgba(255,255,255,0.1);color:#fff;}
.sb-item.active{background:rgba(255,255,255,0.18);color:#fff;font-weight:600;}
.sb-item.hidden{display:none;}
.sb-item i{font-size:17px;flex-shrink:0;}
.sb-item .sb-label{flex:1;}
.sb-item .sb-count{font-size:10.5px;font-weight:700;background:rgba(255,255,255,0.15);color:#fff;border-radius:var(--rpill);padding:2px 7px;}
.sb-item.active .sb-count{background:rgba(255,255,255,0.28);}
.sb-no-results{font-size:11.5px;color:rgba(255,255,255,0.35);text-align:center;padding:1rem 0;display:none;}

/* STATS */
.sb-stats{flex-shrink:0;margin:.6rem .7rem;background:rgba(255,255,255,0.08);border-radius:10px;padding:9px 11px;display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.sb-stat-item{text-align:center;}
.sb-stat-val{font-size:17px;font-weight:800;color:#fff;line-height:1;}
.sb-stat-lbl{font-size:9px;color:var(--ton-m2);margin-top:2px;text-transform:uppercase;letter-spacing:.05em;}

/* BOTTOM ACTIONS */
.sb-bottom{padding:.7rem .7rem .9rem;border-top:1px solid rgba(255,255,255,0.1);flex-shrink:0;display:flex;gap:6px;}
.sb-action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:8px 6px;border-radius:8px;background:rgba(255,255,255,0.1);color:var(--ton-m2);font-size:11.5px;font-weight:600;cursor:pointer;border:none;transition:all .15s;text-decoration:none;}
.sb-action-btn:hover{background:rgba(255,255,255,0.2);color:#fff;}
.sb-action-btn i{font-size:15px;}

.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:99;opacity:0;transition:opacity .3s;}
.sb-overlay.show{opacity:1;}

/* MAIN */
.main{margin-left:var(--sw);flex:1;min-width:0;display:flex;flex-direction:column;min-height:100vh;}

/* TOPBAR */
.topbar{background:var(--surface);border-bottom:1px solid var(--bdr);padding:0 1.6rem;height:58px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm);}
.hamburger{display:none;background:none;border:none;cursor:pointer;color:var(--t2);font-size:22px;padding:4px;border-radius:6px;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:700;color:var(--t1);}
.topbar-sub{font-size:12px;color:var(--t3);margin-left:4px;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.topbar-count{font-size:12px;font-weight:600;background:var(--maroon-light);color:var(--maroon);padding:4px 12px;border-radius:var(--rpill);}
[data-theme="dark"] .topbar-count{background:var(--maroon-light2);color:#f9a8d4;}
.theme-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rpill);border:1.5px solid var(--bdr);background:var(--surface2);color:var(--t2);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;}
.theme-btn:hover{border-color:var(--bdr-h);color:var(--t1);}
.theme-btn i{font-size:15px;}

/* CONTENT */
.content{padding:1.4rem 1.6rem 5rem;flex:1;}

/* CONTROLS */
.controls{display:flex;gap:10px;margin-bottom:1.2rem;align-items:center;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-wrap i.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--t3);pointer-events:none;}
.search-wrap input{width:100%;padding:9px 13px 9px 38px;border:1.5px solid var(--bdr);border-radius:var(--rsm);background:var(--surface);font-size:13.5px;color:var(--t1);outline:none;transition:border-color .15s;box-shadow:var(--shadow-sm);}
.search-wrap input:focus{border-color:var(--maroon);}
.search-wrap input::placeholder{color:var(--t3);}

/* DROPDOWNS */
.dropdown-wrap{position:relative;min-width:165px;}
.dropdown-btn{width:100%;display:flex;align-items:center;gap:7px;padding:9px 13px;border-radius:var(--rsm);border:1.5px solid var(--bdr);background:var(--surface);color:var(--t1);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:left;box-shadow:var(--shadow-sm);white-space:nowrap;}
.dropdown-btn:hover{border-color:var(--bdr-h);}
.dropdown-btn.open{border-color:var(--maroon);}
.dropdown-btn i.arrow{font-size:15px;color:var(--t3);transition:transform .2s;margin-left:auto;flex-shrink:0;}
.dropdown-btn.open i.arrow{transform:rotate(180deg);}
.dropdown-btn i.di{font-size:15px;color:var(--t3);flex-shrink:0;}
.sel-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px;}
.dropdown-menu{position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--surface);border:1.5px solid var(--bdr);border-radius:var(--rsm);box-shadow:var(--shadow-lg);z-index:200;max-height:270px;overflow-y:auto;display:none;}
.dropdown-menu.open{display:block;animation:dropIn .15s ease;}
@keyframes dropIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.dd-search-wrap{padding:7px 9px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--surface);z-index:1;position:relative;}
.dd-search-wrap i{position:absolute;left:17px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--t3);}
.dd-search-wrap input{width:100%;padding:5px 9px 5px 26px;border:1px solid var(--bdr);border-radius:6px;background:var(--surface2);color:var(--t1);font-size:12px;outline:none;}
.dd-search-wrap input:focus{border-color:var(--maroon);}
.dd-search-wrap input::placeholder{color:var(--t3);}
.dd-opt{display:flex;align-items:center;justify-content:space-between;padding:8px 13px;font-size:12.5px;color:var(--t2);cursor:pointer;transition:background .1s;gap:7px;}
.dd-opt:hover{background:var(--surface2);}
.dd-opt.active{background:var(--maroon-light);color:var(--maroon);font-weight:600;}
[data-theme="dark"] .dd-opt.active{background:var(--maroon-light2);color:#f9a8d4;}
.dd-opt .opt-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dd-opt .opt-cnt{font-size:10.5px;color:var(--t3);flex-shrink:0;}
.dd-divider{height:1px;background:var(--bdr);margin:2px 0;}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;}
.count-txt{font-size:12.5px;color:var(--t3);}
.count-txt b{color:var(--t1);}

/* SECTION HEADER */
.section-block{margin-bottom:1.8rem;}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:.9rem;}
.section-line{flex:1;height:1px;background:var(--bdr);}
.section-label{display:flex;align-items:center;justify-content:center;gap:5px;font-size:10.5px;font-weight:700;color:var(--maroon);text-transform:uppercase;letter-spacing:.1em;background:var(--bg);padding:0 10px;white-space:nowrap;}
.section-label i{font-size:12px;}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:13px;}

/* CARD */
.card{background:var(--surface);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .2s,transform .2s,border-color .2s;}
.card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px);border-color:var(--bdr-h);}
.card-banner{height:76px;display:flex;align-items:flex-end;padding:0 1rem 0;position:relative;}
.card-avatar{width:50px;height:50px;border-radius:50%;border:3px solid var(--surface);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;position:absolute;bottom:-21px;left:1rem;box-shadow:0 2px 8px rgba(0,0,0,0.15);flex-shrink:0;}
.card-cat-badge{margin-left:auto;margin-bottom:9px;font-size:9.5px;font-weight:700;background:rgba(255,255,255,0.18);color:#fff;padding:2px 9px;border-radius:var(--rpill);}
.card-body{padding:28px 1rem 9px;}
.card-name{font-weight:700;font-size:14.5px;color:var(--t1);margin-bottom:2px;}
.card-desig{font-size:11.5px;color:var(--t2);line-height:1.4;margin-bottom:7px;}
.card-co{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--maroon);font-weight:600;margin-bottom:11px;}
.card-co i{font-size:13px;}
.contact-rows{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}
.info-row{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--t2);}
.icon-pill{width:28px;height:28px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.icon-pill.phone{background:var(--phone-bg);color:var(--phone-c);}
.icon-pill.mail{background:var(--mail-bg);color:var(--mail-c);}
.icon-pill.li{background:var(--li-bg);color:var(--li-c);}
.info-row a{color:var(--maroon);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:190px;display:block;}
.info-row a:hover{text-decoration:underline;}
.card-footer{border-top:1px solid var(--bdr);padding:.6rem 1rem;display:flex;gap:7px;}
.card-action{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px 7px;border-radius:7px;font-size:11.5px;font-weight:600;text-decoration:none;cursor:pointer;transition:all .15s;border:1.5px solid var(--bdr);background:var(--surface2);color:var(--t2);}
.card-action:hover{border-color:var(--bdr-h);color:var(--t1);}
.card-action.call:hover{background:var(--phone-bg);border-color:var(--phone-c);color:var(--phone-c);}
.card-action.email-btn:hover{background:var(--mail-bg);border-color:#93c5fd;color:var(--mail-c);}
.card-action.linkedin-btn:hover{background:var(--li-bg);border-color:#a5b4fc;color:var(--li-c);}
.card-action i{font-size:13px;}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:4rem 2rem;color:var(--t3);}
.empty i{font-size:44px;display:block;margin-bottom:11px;opacity:.35;}
.empty p{font-size:13.5px;}

/* BOTTOM CHIP */
.bottom-chip{position:fixed;bottom:16px;right:16px;display:flex;align-items:center;gap:6px;background:var(--maroon);border-radius:var(--rpill);padding:7px 14px 7px 11px;font-size:12.5px;font-weight:700;color:#fff;box-shadow:var(--shadow-md);z-index:100;pointer-events:none;}
.bottom-chip i{font-size:15px;color:rgba(255,255,255,0.8);}

@media(max-width:900px){.grid{grid-template-columns:1fr 1fr;}}
@media(max-width:700px){
  :root{--sw:0px;}
  .sidebar{transform:translateX(-240px);width:240px;}
  .sidebar.open{transform:translateX(0);}
  .sb-overlay{display:block;}
  .main{margin-left:0;}
  .hamburger{display:flex;}
  .topbar{padding:0 1rem;}
  .content{padding:1.2rem 1rem 5rem;}
  .grid{grid-template-columns:1fr;gap:9px;}
  .controls{flex-direction:column;gap:7px;}
  .search-wrap,.dropdown-wrap{width:100%;min-width:unset;}
  .sel-txt{max-width:unset;}
  .bottom-chip .bc-label{display:none;}
  .bottom-chip{padding:9px 11px;border-radius:50%;}
}
@media(max-width:480px){.grid{grid-template-columns:1fr;}.topbar-sub{display:none;}}
</style>
</head>
<body>

<div class="sb-overlay" id="sbOverlay" onclick="closeSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sb-brand">
    <div class="sb-logo">
      <div class="sb-logo-icon"><i class="ti ti-address-book"></i></div>
      <div>
        <div class="sb-logo-text">HR Directory</div>
        <div class="sb-logo-sub">Talent Network</div>
      </div>
    </div>
    <a href="https://navneetpa.github.io/my-profile" target="_blank" rel="noopener" class="sb-profile">
      <div class="sb-profile-av">NP</div>
      <div>
        <div class="sb-profile-name">Navneet Pathak</div>
        <div class="sb-profile-role">View my profile →</div>
      </div>
    </a>
  </div>

  <!-- SIDEBAR SEARCH -->
  <div class="sb-search">
    <div class="sb-search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="sbSearchInput" placeholder="Quick search…" oninput="filterSidebarItems()"/>
      <i class="ti ti-x sb-search-clear" id="sbSearchClear" onclick="clearSbSearch()"></i>
    </div>

  <div class="sb-bottom">

      <i class="ti ti-moon" id="themeIconSb"></i>
      <span id="themeLabelSb">Dark</span>
    </button>
    <a href="https://navneetpa.github.io/my-profile" target="_blank" rel="noopener" class="sb-action-btn">
      <i class="ti ti-user-circle"></i>
      <span>Profile</span>

    <button class="sb-action-btn" onclick="alert('Share feature coming soon!')">

</aside>

<div class="main">

    <div class="topbar-right">
      <span class="topbar-count" id="topbarCount">50 contacts</span>

  <div class="content">

      <div class="search-wrap">
        <i class="ti ti-search si"></i>
        <input type="text" id="searchInput" placeholder="Search name, company or role…" oninput="render()"/>
      </div>
      <div class="dropdown-wrap" id="catWrap">
        <button class="dropdown-btn" id="catBtn" onclick="toggleCatDD()">

          <span class="sel-txt" id="catBtnText">All Categories</span>
          <i class="ti ti-chevron-down arrow"></i>
        </button>
        <div class="dropdown-menu" id="catMenu">
          <div class="dd-opt active" data-val="All" onclick="setCatDD('All',this)">
            <span class="opt-lbl">All Categories</span>
            <span class="opt-cnt" id="catAllCnt">50</span>

          <div class="dd-divider"></div>
          <div id="catOpts"></div>
        </div>
      </div>
      <div class="dropdown-wrap" id="coWrap">

        <div class="dropdown-menu" id="coMenu">

            <i class="ti ti-search"></i>
            <input type="text" id="coSearch" placeholder="Search company…" oninput="filterCoOpts()"/>
          </div>
          <div class="dd-opt active" data-val="All" onclick="setCoDD('All',this)">
            <span class="opt-lbl">All Companies</span>
            <span class="opt-cnt" id="coAllCnt"></span>
          </div>
          <div class="dd-divider"></div>
          <div id="coOpts"></div>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <div class="count-txt" id="countTxt"></div>
    </div>

    <div id="sectionsContainer"></div>
  </div>
</div>

<div class="bottom-chip" id="bottomChip">
  <i class="ti ti-users"></i>
  <span class="bc-label" id="bottomChipCount">50 contacts</span>
</div>

<script>

function toggleTheme(){
  isDark=!isDark;
  document.documentElement.setAttribute("data-theme",isDark?"dark":"light");
  const icon=isDark?"ti ti-sun":"ti ti-moon";
  const lbl=isDark?"Light":"Dark";
  document.getElementById("themeIconSb").className=icon;
  document.getElementById("themeIcon2").className=icon;
  document.getElementById("themeLabel2").textContent=lbl;
  document.getElementById("themeLabelSb").textContent=lbl;
  render();
}

function openSidebar(){
  document.getElementById("sidebar").classList.add("open");
  const ov=document.getElementById("sbOverlay");
  ov.classList.add("show");ov.style.display="block";
}
function closeSidebar(){
  document.getElementById("sidebar").classList.remove("open");
  const ov=document.getElementById("sbOverlay");
  ov.classList.remove("show");
  setTimeout(()=>ov.style.display="none",300);
}

/* SIDEBAR SEARCH */
function filterSidebarItems(){
  const q=document.getElementById("sbSearchInput").value.toLowerCase().trim();
  const clear=document.getElementById("sbSearchClear");
  clear.style.display=q?"block":"none";
  const items=document.querySelectorAll(".sb-item[data-cat]");
  let anyVisible=false;
  items.forEach(el=>{
    const label=el.querySelector(".sb-label").textContent.toLowerCase();
    const visible=!q||label.includes(q)||"all contacts".includes(q);
    el.classList.toggle("hidden",!visible);
    if(visible)anyVisible=true;
  });
  document.getElementById("sbNoResults").style.display=anyVisible?"none":"block";
}
function clearSbSearch(){
  document.getElementById("sbSearchInput").value="";
  document.getElementById("sbSearchClear").style.display="none";
  filterSidebarItems();
  document.getElementById("sbSearchInput").focus();
}

function initSidebar(){
  const nav=document.getElementById("sidebarNav");
  const noRes=document.getElementById("sbNoResults");
  const allCfg=catCfg["All"];
  let html=`
    <div class="sb-nav-label">Categories</div>
    <div class="sb-item active" data-cat="All" onclick="setSidebarCat('All',this)">
      <i class="ti ${allCfg.icon}"></i>
      <span class="sb-label">All Contacts</span>
      <span class="sb-count">${data.length}</span>
    </div>`;
  cats.forEach(c=>{
    const cfg=catCfg[c]||defCfg;
    html+=`
    <div class="sb-item" data-cat="${c}" onclick="setSidebarCat('${c}',this)">
      <i class="ti ${cfg.icon}"></i>
      <span class="sb-label">${c}</span>
      <span class="sb-count">${data.filter(d=>d.cat===c).length}</span>
    </div>`;
  });
  nav.insertAdjacentHTML("afterbegin",html);

  document.getElementById("sbStats").innerHTML=`
    <div class="sb-stat-item"><div class="sb-stat-val">${data.length}</div><div class="sb-stat-lbl">Contacts</div></div>
    <div class="sb-stat-item"><div class="sb-stat-val">${cats.length}</div><div class="sb-stat-lbl">Categories</div></div>
    <div class="sb-stat-item"><div class="sb-stat-val">${cos.length}</div><div class="sb-stat-lbl">Companies</div></div>
    <div class="sb-stat-item"><div class="sb-stat-val">IN</div><div class="sb-stat-lbl">Region</div></div>`;
}

function setSidebarCat(cat,el){
  activeCat=cat;activeCo="All";
  document.querySelectorAll(".sb-item").forEach(i=>i.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("coBtnText").textContent="All Companies";
  document.getElementById("catBtnText").textContent=cat==="All"?"All Categories":cat;
  document.querySelectorAll("#catMenu .dd-opt").forEach(o=>o.classList.remove("active"));
  const allCatOpt=document.querySelector("#catMenu .dd-opt[data-val='All']");
  if(allCatOpt&&cat==="All")allCatOpt.classList.add("active");
  document.querySelectorAll("#coMenu .dd-opt").forEach(o=>o.classList.remove("active"));
  const allCoOpt=document.querySelector("#coMenu .dd-opt[data-val='All']");
  if(allCoOpt)allCoOpt.classList.add("active");
  document.getElementById("topbarTitle").textContent=cat==="All"?"All Contacts":cat;
  renderCoOpts();render();
  if(window.innerWidth<=700)closeSidebar();
}

/* CATEGORY DROPDOWN */
function toggleCatDD(){
  const btn=document.getElementById("catBtn");
  const menu=document.getElementById("catMenu");
  const isOpen=menu.classList.contains("open");
  document.getElementById("coMenu").classList.remove("open");
  document.getElementById("coBtn").classList.remove("open");
  menu.classList.toggle("open",!isOpen);
  btn.classList.toggle("open",!isOpen);
}
function setCatDD(cat,el){
  activeCat=cat;activeCo="All";
  document.querySelectorAll("#catMenu .dd-opt").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("catBtnText").textContent=cat==="All"?"All Categories":cat;
  document.getElementById("catMenu").classList.remove("open");
  document.getElementById("catBtn").classList.remove("open");
  document.getElementById("coBtnText").textContent="All Companies";
  document.querySelectorAll("#coMenu .dd-opt").forEach(o=>o.classList.remove("active"));
  const allOptCo=document.querySelector("#coMenu .dd-opt[data-val='All']");
  if(allOptCo)allOptCo.classList.add("active");
  document.getElementById("topbarTitle").textContent=cat==="All"?"All Contacts":cat;
  document.querySelectorAll(".sb-item[data-cat]").forEach(i=>{
    i.classList.toggle("active",i.dataset.cat===cat);
  });
  renderCoOpts();render();
}
function initCatOpts(){
  document.getElementById("catAllCnt").textContent=data.length;
  document.getElementById("catOpts").innerHTML=cats.map(c=>{
    const cfg=catCfg[c]||defCfg;
    return `<div class="dd-opt" data-val="${c}" onclick="setCatDD('${c}',this)">
      <span class="opt-lbl"><i class="ti ${cfg.icon}" style="font-size:13px;margin-right:5px;vertical-align:-1px;"></i>${c}</span>
      <span class="opt-cnt">${data.filter(d=>d.cat===c).length}</span>
    </div>`;
  }).join("");
}

/* COMPANY DROPDOWN */
function toggleCoDD(){
  const btn=document.getElementById("coBtn");
  const menu=document.getElementById("coMenu");
  const isOpen=menu.classList.contains("open");
  document.getElementById("catMenu").classList.remove("open");
  document.getElementById("catBtn").classList.remove("open");
  menu.classList.toggle("open",!isOpen);
  btn.classList.toggle("open",!isOpen);
  if(!isOpen)setTimeout(()=>{const s=document.getElementById("coSearch");if(s)s.focus();},50);
}
function renderCoOpts(){
  const vis=activeCat==="All"?cos:[...new Set(data.filter(d=>d.cat===activeCat).map(d=>d.co))];
  document.getElementById("coAllCnt").textContent=data.filter(d=>activeCat==="All"||d.cat===activeCat).length;
  document.getElementById("coOpts").innerHTML=vis.map(c=>`
    <div class="dd-opt" data-val="${c}" onclick="setCoDD('${c.replace(/'/g,"\\'")}',this)">
      <span class="opt-lbl">${c}</span>
      <span class="opt-cnt">${data.filter(d=>d.co===c).length}</span>
    </div>`).join("");
  document.querySelectorAll("#coOpts .dd-opt").forEach(el=>{
    if(el.dataset.val===activeCo)el.classList.add("active");
  });
}
function filterCoOpts(){
  const q=document.getElementById("coSearch").value.toLowerCase();
  document.querySelectorAll("#coOpts .dd-opt").forEach(el=>{
    el.style.display=el.querySelector(".opt-lbl").textContent.toLowerCase().includes(q)?"":"none";
  });
}
function setCoDD(co,el){
  activeCo=co;
  document.querySelectorAll("#coMenu .dd-opt").forEach(o=>o.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("coBtnText").textContent=co==="All"?"All Companies":co;
  document.getElementById("coMenu").classList.remove("open");
  document.getElementById("coBtn").classList.remove("open");
  render();
}

document.addEventListener("click",e=>{
  if(!e.target.closest("#catWrap")){document.getElementById("catMenu").classList.remove("open");document.getElementById("catBtn").classList.remove("open");}
  if(!e.target.closest("#coWrap")){document.getElementById("coMenu").classList.remove("open");document.getElementById("coBtn").classList.remove("open");}
});

function cardHTML(d,idx){
  const av=avCol(d.co);
  const banner=bannerColor(d.cat,idx);
  const cfg=catCfg[d.cat]||defCfg;
  return `
  <div class="card">
    <div class="card-banner" style="background:${banner};">
      <div class="card-avatar" style="background:${av.bg};color:${av.c};">${inits(d.name)}</div>
      <span class="card-cat-badge"><i class="ti ${cfg.icon}" style="font-size:9px;vertical-align:-1px;margin-right:3px;"></i>${d.cat}</span>
    </div>
    <div class="card-body">
      <div class="card-name">${d.name}</div>
      <div class="card-desig">${d.desig}</div>
      <div class="card-co"><i class="ti ti-building"></i>${d.co}</div>
      <div class="contact-rows">
        <div class="info-row"><div class="icon-pill phone"><i class="ti ti-phone"></i></div><span>${d.ph}</span></div>
        <div class="info-row"><div class="icon-pill mail"><i class="ti ti-mail"></i></div><a href="mailto:${d.email}" title="${d.email}">${d.email}</a></div>
        <div class="info-row"><div class="icon-pill li"><i class="ti ti-brand-linkedin"></i></div><a href="${d.li}" target="_blank" rel="noopener">View LinkedIn</a></div>
      </div>
    </div>
    <div class="card-footer">
      <a href="tel:${d.ph}" class="card-action call"><i class="ti ti-phone"></i>Call</a>
      <a href="mailto:${d.email}" class="card-action email-btn"><i class="ti ti-mail"></i>Email</a>
      <a href="${d.li}" target="_blank" rel="noopener" class="card-action linkedin-btn"><i class="ti ti-brand-linkedin"></i>LinkedIn</a>
    </div>
  </div>`;
}

function render(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const filtered=data.filter(d=>{
    const mc=activeCat==="All"||d.cat===activeCat;
    const mco=activeCo==="All"||d.co===activeCo;
    const ms=!q||d.name.toLowerCase().includes(q)||d.co.toLowerCase().includes(q)||d.desig.toLowerCase().includes(q);
    return mc&&mco&&ms;
  });
  document.getElementById("countTxt").innerHTML=`Showing <b>${filtered.length}</b> of <b>${data.length}</b> contacts`;
  document.getElementById("topbarCount").textContent=`${filtered.length} contacts`;
  const bc=document.getElementById("bottomChipCount");
  if(bc)bc.textContent=`${filtered.length} contacts`;
  const container=document.getElementById("sectionsContainer");
  if(!filtered.length){
    container.innerHTML=`<div class="grid"><div class="empty"><i class="ti ti-user-search"></i><p>No contacts found.</p></div></div>`;
    return;
  }
  const isSearching=q||activeCo!=="All";
  if(isSearching||activeCat!=="All"){
    container.innerHTML=`<div class="grid">${filtered.map((d,i)=>cardHTML(d,i)).join("")}</div>`;
    return;
  }
  const groupedCats=[...new Set(filtered.map(d=>d.cat))];
  let html="";
  groupedCats.forEach(cat=>{
    const group=filtered.filter(d=>d.cat===cat);
    const cfg=catCfg[cat]||defCfg;
    html+=`
    <div class="section-block">
      <div class="section-header">
        <div class="section-line"></div>
        <div class="section-label"><i class="ti ${cfg.icon}"></i>${cat} · ${group.length} contacts</div>
        <div class="section-line"></div>
      </div>
      <div class="grid">${group.map((d,i)=>cardHTML(d,i)).join("")}</div>
    </div>`;
  });
  container.innerHTML=html;
}

initSidebar();
initCatOpts();
renderCoOpts();
render();
</script>
</body>
</html>
