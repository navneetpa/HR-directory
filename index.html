<!DOCTYPE html>
<html lang="en" data-theme="light">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HR Directory Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root, [data-theme="light"] {
    --bg:             #f4f6f9;
    --surface:        #ffffff;
    --surface-2:      #f0f2f5;
    --border:         rgba(0,0,0,0.09);
    --border-hover:   rgba(0,0,0,0.18);
    --text-primary:   #111827;
    --text-secondary: #4b5563;
    --text-muted:     #9ca3af;
    --accent:         #1d6fca;
    --chip-active-text: #fff;
    --phone-bg:#e8f5e9; --phone-icon:#2e7d32;
    --email-bg:#e3f2fd; --email-icon:#1565c0;
    --li-bg:  #e8eaf6; --li-icon:  #283593;
  }

  [data-theme="dark"] {
    --bg:             #0f1117;
    --surface:        #1a1d27;
    --surface-2:      #22263a;
    --border:         rgba(255,255,255,0.08);
    --border-hover:   rgba(255,255,255,0.18);
    --text-primary:   #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted:     #64748b;
    --accent:         #4d9de0;
    --chip-active-text: #0f1117;
    --phone-bg:#1b2e1c; --phone-icon:#81c784;
    --email-bg:#162032; --email-icon:#64b5f6;
    --li-bg:  #181e36; --li-icon:  #7986cb;
  }

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; transition: background 0.25s, color 0.25s; }

  .header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 1.1rem 2rem; display: flex; align-items: center; justify-content: space-between; gap: 12px; position: sticky; top: 0; z-index: 10; transition: background 0.25s, border-color 0.25s; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-icon { font-size: 26px; color: var(--accent); }
  .header h1 { font-size: 18px; font-weight: 600; color: var(--text-primary); }
  .header p  { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

  .header-right { display: flex; align-items: center; gap: 10px; }

  .theme-toggle { display: flex; align-items: center; gap: 8px; background: var(--surface-2); border: 0.5px solid var(--border); border-radius: 24px; padding: 5px 14px 5px 10px; cursor: pointer; font-size: 13px; color: var(--text-secondary); transition: all 0.2s; user-select: none; flex-shrink: 0; text-decoration: none; }
  .theme-toggle:hover { border-color: var(--border-hover); }
  .theme-toggle i { font-size: 17px; }

  .profile-btn { display: flex; align-items: center; gap: 8px; background: var(--accent); border: none; border-radius: 24px; padding: 6px 16px 6px 10px; cursor: pointer; font-size: 13px; font-weight: 500; color: #fff; text-decoration: none; transition: opacity 0.2s; flex-shrink: 0; }
  .profile-btn:hover { opacity: 0.88; }
  .profile-btn i { font-size: 17px; }
  [data-theme="dark"] .profile-btn { color: #0f1117; }

  /* ── Watermark ── */
  .watermark {
    position: fixed; bottom: 18px; right: 22px;
    display: flex; align-items: center; gap: 7px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 24px;
    padding: 6px 14px 6px 10px;
    font-size: 12px; font-weight: 500;
    color: var(--text-muted);
    text-decoration: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    z-index: 100;
    transition: all 0.2s;
    user-select: none;
  }
  .watermark:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
  .watermark i { font-size: 15px; color: var(--accent); }
  [data-theme="dark"] .watermark { box-shadow: 0 2px 12px rgba(0,0,0,0.4); }

  .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem; }

  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; transition: background 0.25s, border-color 0.25s; }
  .stat-card .label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-card .value { font-size: 26px; font-weight: 700; color: var(--text-primary); }
  .stat-card .sub   { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .search-wrap { position: relative; margin-bottom: 1rem; }
  .search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 16px; color: var(--text-muted); pointer-events: none; }
  .search-wrap input { width: 100%; padding: 10px 12px 10px 38px; border: 0.5px solid var(--border); border-radius: 8px; background: var(--surface); font-size: 14px; color: var(--text-primary); outline: none; transition: border-color 0.15s, background 0.25s; }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--text-muted); }

  .filter-section { margin-bottom: 1.5rem; }
  .filter-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px; }
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .chip { padding: 5px 13px; border-radius: 20px; font-size: 13px; border: 0.5px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; white-space: nowrap; user-select: none; }
  .chip:hover { border-color: var(--border-hover); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: var(--chip-active-text); }

  .count-line { font-size: 13px; color: var(--text-muted); margin-bottom: 1rem; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }

  .card { background: var(--surface); border-radius: 12px; border: 0.5px solid var(--border); padding: 1.1rem 1.25rem; transition: border-color 0.15s, background 0.25s, box-shadow 0.15s; }
  .card:hover { border-color: var(--border-hover); box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
  [data-theme="dark"] .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.4); }

  .card-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .avatar { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; flex-shrink: 0; }
  .card-name  { font-weight: 600; font-size: 15px; color: var(--text-primary); }
  .card-desig { font-size: 12px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }

  .badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  .badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; }
  .badge i { font-size: 12px; }

  .contact-rows { display: flex; flex-direction: column; gap: 7px; }
  .info-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-secondary); }
  .icon-pill { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; transition: background 0.25s; }
  .icon-pill.phone    { background: var(--phone-bg); color: var(--phone-icon); }
  .icon-pill.email    { background: var(--email-bg); color: var(--email-icon); }
  .icon-pill.linkedin { background: var(--li-bg);    color: var(--li-icon); }
  .info-row span { color: var(--text-secondary); }
  .info-row a { color: var(--accent); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 210px; display: block; }
  .info-row a:hover { text-decoration: underline; }

  .empty { grid-column: 1/-1; text-align: center; padding: 4rem 2rem; color: var(--text-muted); }
  .empty i { font-size: 40px; display: block; margin-bottom: 10px; }

  /* ── Tablet ── */
  @media (max-width: 768px) {
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .grid { grid-template-columns: 1fr 1fr; gap: 10px; }
    .info-row a { max-width: 160px; }
  }

  /* ── Mobile ── */
  @media (max-width: 600px) {
    .container { padding: 0.9rem 1rem; }

    /* Header */
    .header { padding: 0.8rem 1rem; gap: 8px; }
    .header h1 { font-size: 15px; }
    .header p  { display: none; }
    .header-right { gap: 7px; }

    /* Hide text labels on small screens — show only icons */
    .profile-btn .btn-label { display: none; }
    .profile-btn { padding: 7px 10px; border-radius: 50%; }
    .theme-toggle .btn-label { display: none; }
    .theme-toggle { padding: 7px 10px; border-radius: 50%; }

    /* Stats */
    .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 1rem; }
    .stat-card { padding: 0.8rem 1rem; }
    .stat-card .value { font-size: 22px; }

    /* Search */
    .search-wrap input { font-size: 14px; padding: 9px 12px 9px 36px; }

    /* Filter chips */
    .chip-row { gap: 5px; }
    .chip { font-size: 12px; padding: 4px 11px; }
    .filter-label { font-size: 10px; }

    /* Grid — single column */
    .grid { grid-template-columns: 1fr; gap: 10px; }

    /* Cards */
    .card { padding: 1rem; }
    .card-name { font-size: 14px; }
    .card-desig { font-size: 11px; }
    .info-row a { max-width: 200px; }

    /* Watermark — icon only on mobile */
    .watermark { bottom: 12px; right: 12px; padding: 8px; border-radius: 50%; }
    .watermark .wm-label { display: none; }
    .watermark i { font-size: 18px; margin: 0; }
  }

  /* ── Very small screens ── */
  @media (max-width: 360px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    .stat-card .value { font-size: 20px; }
    .header-icon { font-size: 20px; }
    .header h1 { font-size: 14px; }
  }
</style>
</head>

const companyColorMap = {};
companies.forEach((c, i) => { companyColorMap[c] = i % avatarPalettes.length; });

// ─────────────────────────────────────────────────────────────
// THEME
// ─────────────────────────────────────────────────────────────
function toggleTheme() {
  isDark = !isDark;
  document.documentElement.setAttribute("data-theme", isDark ? "dark" : "light");
  document.getElementById("themeIcon").className  = isDark ? "ti ti-sun"  : "ti ti-moon";
  document.getElementById("themeLabel").textContent = isDark ? "Light mode" : "Dark mode";
  render();
}
function mode() { return isDark ? "dark" : "light"; }

// ─────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────
function initials(name) { return name.split(" ").slice(0,2).map(n=>n[0]).join("").toUpperCase(); }
function getCatColor(cat) { return (categoryColors[cat] || defaultCatColor)[mode()]; }
function getAvatarColor(company) { return avatarPalettes[companyColorMap[company]][mode()]; }

// ─────────────────────────────────────────────────────────────
// STATS
// ─────────────────────────────────────────────────────────────
function initStats() {
  const taCount = data.filter(d => d.designation.toLowerCase().includes("talent")).length;
  document.getElementById("statsRow").innerHTML = `
    <div class="stat-card"><div class="label">Total contacts</div><div class="value">${data.length}</div><div class="sub">HR professionals</div></div>
    <div class="stat-card"><div class="label">Companies</div><div class="value">${companies.length}</div><div class="sub">Organizations</div></div>
    <div class="stat-card"><div class="label">Categories</div><div class="value">${categories.length}</div><div class="sub">Sectors</div></div>
    <div class="stat-card"><div class="label">Talent Acquisition</div><div class="value">${taCount}</div><div class="sub">Specialists</div></div>
  `;
}

// ─────────────────────────────────────────────────────────────
// FILTERS
// ─────────────────────────────────────────────────────────────
function initFilters() {
  document.getElementById("categoryRow").innerHTML =
    `<button class="chip active" onclick="setCategory('All',this)">All (${data.length})</button>` +
    categories.map(c => `<button class="chip" onclick="setCategory('${c}',this)">${c} (${data.filter(d=>d.category===c).length})</button>`).join("");
  renderCompanyChips();
}

function renderCompanyChips() {
  const visible = activeCategory === "All"
    ? companies
    : [...new Set(data.filter(d => d.category === activeCategory).map(d => d.company))];
  document.getElementById("companyRow").innerHTML =
    `<button class="chip active" onclick="setCompany('All',this)">All</button>` +
    visible.map(c => `<button class="chip" onclick="setCompany(\`${c}\`,this)">${c} (${data.filter(d=>d.company===c).length})</button>`).join("");
}

function setCategory(cat, el) {
  activeCategory = cat; activeCompany = "All";
  document.querySelectorAll("#categoryRow .chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active");
  renderCompanyChips(); render();
}
function setCompany(co, el) {
  activeCompany = co;
  document.querySelectorAll("#companyRow .chip").forEach(c => c.classList.remove("active"));
  el.classList.add("active"); render();
}

// ─────────────────────────────────────────────────────────────
// RENDER CARDS
// ─────────────────────────────────────────────────────────────
function render() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = data.filter(d => {
    const matchCat     = activeCategory === "All" || d.category === activeCategory;
    const matchCompany = activeCompany  === "All" || d.company  === activeCompany;
    const matchSearch  = !q || d.name.toLowerCase().includes(q) || d.company.toLowerCase().includes(q) || d.designation.toLowerCase().includes(q);
    return matchCat && matchCompany && matchSearch;
  });

  document.getElementById("countLine").textContent = `${filtered.length} contact${filtered.length !== 1 ? "s" : ""} found`;

  const grid = document.getElementById("grid");
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty"><i class="ti ti-user-x"></i><p>No contacts found</p></div>`;
    return;
  }

  grid.innerHTML = filtered.map(d => {
    const av        = getAvatarColor(d.company);
    const cc        = getCatColor(d.category);
    const compBadge = avatarPalettes[(companyColorMap[d.company] + 3) % avatarPalettes.length][mode()];
    return `
    <div class="card">
      <div class="card-head">
        <div class="avatar" style="background:${av.bg};color:${av.color}">${initials(d.name)}</div>
        <div>
          <div class="card-name">${d.name}</div>
          <div class="card-desig">${d.designation}</div>
        </div>
      </div>
      <div class="badge-row">
        <span class="badge" style="background:${cc.bg};color:${cc.color}"><i class="ti ti-tag"></i>${d.category}</span>
        <span class="badge" style="background:${compBadge.bg};color:${compBadge.color}"><i class="ti ti-building"></i>${d.company}</span>
      </div>
      <div class="contact-rows">
        <div class="info-row">
          <div class="icon-pill phone"><i class="ti ti-phone"></i></div>
          <span>${d.phone}</span>
        </div>
        <div class="info-row">
          <div class="icon-pill email"><i class="ti ti-mail"></i></div>
          <a href="mailto:${d.email}" title="${d.email}">${d.email}</a>
        </div>
        <div class="info-row">
          <div class="icon-pill linkedin"><i class="ti ti-brand-linkedin"></i></div>
          <a href="${d.linkedin}" target="_blank" rel="noopener">View LinkedIn profile</a>
        </div>
      </div>
    </div>`;
  }).join("");
}

// ─────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────
initStats();
initFilters();
render();
</script>
</body>
</html>
